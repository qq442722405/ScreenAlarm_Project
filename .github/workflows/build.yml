name: Build EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # ----- 关键修改：使用英文名生成 spec 文件，避免编码问题 -----
      - name: Generate spec file (English name)
        run: |
          pyi-makespec --onefile --windowed --name "ScreenMonitor" --icon favicon.ico --add-data "警报声.mp3;." --add-data "favicon.ico;." 屏幕数值监控报警.py

      # ----- 修改 spec 文件：添加 OpenCV/NumPy 收集，并改回中文名 -----
      - name: Modify spec to include OpenCV/NumPy and rename to Chinese
        shell: powershell
        run: |
          $spec = Get-Content 'ScreenMonitor.spec' -Raw
          $insert = @"
          from PyInstaller.utils.hooks import collect_all
          cv2_datas, cv2_binaries, cv2_hiddenimports = collect_all('cv2')
          a.datas.extend(cv2_datas)
          a.binaries.extend(cv2_binaries)
          a.hiddenimports.extend(cv2_hiddenimports)
          numpy_datas, numpy_binaries, numpy_hiddenimports = collect_all('numpy')
          a.datas.extend(numpy_datas)
          a.binaries.extend(numpy_binaries)
          a.hiddenimports.extend(numpy_hiddenimports)
          "@
          # 在 Analysis 部分之后插入收集代码
          $spec = $spec -replace '(?<=a = Analysis\([\s\S]*?\))', "`n`n$insert"
          # 将 EXE 名称改回中文
          $spec = $spec -replace "name='ScreenMonitor'", "name='屏幕数值监控报警'"
          # 写入新文件（保留原英文 spec 不变，但我们用新文件）
          Set-Content -Path '屏幕数值监控报警.spec' -Value $spec

      # ----- 使用修改后的 spec 打包 -----
      - name: Build EXE
        run: |
          pyinstaller 屏幕数值监控报警.spec

      # ----- 上传产物 -----
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 屏幕数值监控报警
          path: dist/*.exe
          retention-days: 30
