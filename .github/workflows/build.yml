name: Build EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # ---------- 直接写入正确的 .spec 文件 ----------
      - name: Create spec file with OpenCV/NumPy support
        shell: bash
        run: |
          cat > 屏幕数值监控报警.spec << 'EOF'
          # -*- mode: python ; coding: utf-8 -*-

          block_cipher = None

          a = Analysis(
              ['main.py'],
              pathex=[],
              binaries=[],
              datas=[('警报声.mp3', '.'), ('favicon.ico', '.')],
              hiddenimports=['cv2', 'numpy'],
              hookspath=[],
              hooksconfig={},
              runtime_hooks=[],
              excludes=[],
              noarchive=False,
          )

          # 强制收集 OpenCV 和 NumPy
          from PyInstaller.utils.hooks import collect_all

          cv2_datas, cv2_binaries, cv2_hiddenimports = collect_all('cv2')
          a.datas.extend(cv2_datas)
          a.binaries.extend(cv2_binaries)
          a.hiddenimports.extend(cv2_hiddenimports)

          numpy_datas, numpy_binaries, numpy_hiddenimports = collect_all('numpy')
          a.datas.extend(numpy_datas)
          a.binaries.extend(numpy_binaries)
          a.hiddenimports.extend(numpy_hiddenimports)

          pyz = PYZ(a.pure, a.zipped_data, cipher=block_cipher)

          exe = EXE(
              pyz,
              a.scripts,
              a.binaries,
              a.datas,
              [],
              name='屏幕数值监控报警',
              debug=False,
              bootloader_ignore_signals=False,
              strip=False,
              upx=True,
              upx_exclude=[],
              runtime_tmpdir=None,
              console=False,
              icon='favicon.ico',
          )
          EOF

      - name: Build EXE
        run: |
          pyinstaller 屏幕数值监控报警.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 屏幕数值监控报警
          path: dist/*.exe
          retention-days: 30
